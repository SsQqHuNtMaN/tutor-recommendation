<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>教师套磁看板</title>
    <link rel="stylesheet" href="assets/app.css" />
  </head>
  <body>
    <main id="appShell" class="app-shell">
      <header class="topbar">
        <div class="title-block">
          <h1>教师套磁看板</h1>
          <div id="summary" class="summary">未加载数据</div>
        </div>
      </header>

      <section id="calendarPane" class="calendar-pane" aria-label="套磁日历">
        <div id="calendarLayout" class="calendar-layout">
          <div class="calendar-toolbar">
            <div class="calendar-heading">
              <h2 id="calendarRangeLabel" class="calendar-range-label"></h2>
              <div id="calendarRangeSummary" class="calendar-range-summary"></div>
            </div>
            <div class="calendar-toolbar-controls">
              <div class="calendar-navigation" aria-label="四周范围导航">
                <button id="calendarPrev" type="button" title="向前一周">上一周</button>
                <button id="calendarToday" type="button">本周</button>
                <button id="calendarNext" type="button" title="向后一周">下一周</button>
              </div>
              <div class="calendar-filters" aria-label="日历筛选">
                <select id="calendarSchoolFilter" aria-label="日历学校"></select>
                <select id="calendarCollegeFilter" aria-label="日历学院"></select>
              </div>
            </div>
          </div>
          <div id="calendarLegend" class="calendar-legend" aria-label="四周回复情况数量"></div>
          <div class="calendar-table-scroll">
            <div class="calendar-weekdays" aria-hidden="true">
              <span></span>
              <span>星期一</span>
              <span>星期二</span>
              <span>星期三</span>
              <span>星期四</span>
              <span>星期五</span>
              <span>星期六</span>
              <span>星期日</span>
            </div>
            <div id="calendarGrid" class="calendar-strip" aria-label="四周套磁情况"></div>
          </div>
          <section class="calendar-selected-day" aria-live="polite">
            <div class="calendar-selected-heading">
              <h3 id="calendarSelectedDate">选择一天查看教师</h3>
              <span id="calendarSelectedCount" class="count-badge">0</span>
            </div>
            <div id="calendarSelectedTeachers" class="calendar-selected-teachers"></div>
          </section>
          <details id="missingDateSection" class="missing-date-section">
            <summary>
              待补套磁日期
              <span id="missingDateCount" class="count-badge">0</span>
            </summary>
            <div id="missingDateList" class="missing-date-list"></div>
          </details>
        </div>
        <div class="calendar-collapsed-bar" aria-hidden="true">
          <strong>套磁日历</strong>
          <span id="calendarCollapsedSummary"></span>
        </div>
        <button
          id="calendarToggle"
          class="calendar-toggle"
          type="button"
          aria-controls="calendarLayout"
          aria-expanded="true"
          title="收起套磁日历"
        >收起日历 ⌃</button>
      </section>

      <section class="filters" aria-label="教师列表筛选">
        <input id="searchInput" type="search" placeholder="姓名 / 学校 / 方向 / 关键词" />
        <select id="schoolFilter"></select>
        <select id="collegeFilter"></select>
        <select id="levelFilter"></select>
        <select id="contactFilter"></select>
        <label class="check-line">
          <input id="contactedOnly" type="checkbox" />
          <span>查看已套磁</span>
        </label>
        <label class="check-line">
          <input id="hideContacted" type="checkbox" />
          <span>隐藏已标记</span>
        </label>
        <label class="check-line">
          <input id="weakEvidenceOnly" type="checkbox" />
          <span>低证据</span>
        </label>
      </section>

      <section id="workbench" class="workbench">
        <div class="table-pane">
          <table>
            <thead>
              <tr>
                <th>姓名</th>
                <th>套磁情况</th>
                <th>学校 / 学院</th>
                <th>推荐</th>
                <th>分数</th>
                <th>核心匹配</th>
                <th>教师主页方向</th>
                <th>锚点 / 风险</th>
                <th>套磁记录</th>
              </tr>
            </thead>
            <tbody id="teacherRows"></tbody>
          </table>
        </div>
        <div id="detailShell" class="detail-shell">
          <button
            id="detailToggle"
            class="detail-toggle"
            type="button"
            aria-controls="detailPane"
            aria-expanded="true"
            title="收起教师详情"
          >&gt;</button>
          <aside id="detailPane" class="detail-pane">
            <div class="empty-detail">选择一位教师</div>
          </aside>
        </div>
      </section>
    </main>

    <script src="assets/app.js"></script>
  </body>
</html>
